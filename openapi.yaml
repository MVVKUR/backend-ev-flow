          examples:
          - 2
        status:
          anyOf:
          - type: string
          - type: 'null'
          title: Status
          description: Operational status if reported.
          examples:
          - operational
        date_verified:
          anyOf:
          - type: string
          - type: 'null'
          title: Date Verified
          description: ISO timestamp last verified (OCM).
        distance_km:
          anyOf:
          - type: number
          - type: 'null'
          title: Distance Km
          description: Set only on /nearby results.
          examples:
          - 1.42
      type: object
      required:
      - id
      - source
      - latitude
      - longitude
      title: Station
    StationList:
      properties:
        total:
          type: integer
          title: Total
