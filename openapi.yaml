      required:
      - total
      - limit
      - offset
      - items
      title: StationList
    Stats:
      properties:
        total:
          type: integer
          title: Total
          examples:
          - 3569
        by_source:
          items:
            $ref: '#/components/schemas/SourceCount'
          type: array
          title: By Source
        by_province:
          items:
            $ref: '#/components/schemas/NameCount'
          type: array
          title: By Province
        by_charge_type:
          items:
