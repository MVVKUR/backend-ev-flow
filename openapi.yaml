openapi: 3.1.0
info:
  title: EV Charging Stations API — Jakarta / Indonesia
  description: '

    REST API over combined **EV charging-station** data for Jakarta / Indonesia,

    merging three sources:


    * **PLN SPKLU** — official national registry (`petaspklu.id`)

    * **Open Charge Map** — crowd-sourced POIs

    * **OpenStreetMap** — `amenity=charging_station`


    Built for a map frontend: list/filter, nearby search, GeoJSON output, and stats.

    '
  contact:
    name: EV Charging Analysis
    email: softopen24@gmail.com
  license:
    name: 'Data: PLN / OCM (CC-BY-SA) / OSM (ODbL)'
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - system
      summary: Liveness + dataset size
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Health'
  /api/v1/stations:
    get:
      tags:
      - stations
      summary: List / filter charging stations
      operationId: list_stations_api_v1_stations_get
      parameters:
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Source'
          - type: 'null'
          description: Filter by dataset.
          title: Source
        description: Filter by dataset.
      - name: province
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Exact province match (case-insensitive), e.g. 'DKI Jakarta'.
          title: Province
        description: Exact province match (case-insensitive), e.g. 'DKI Jakarta'.
      - name: city
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: City/kabupaten substring match.
          title: City
        description: City/kabupaten substring match.
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive search on station name.
          title: Q
        description: Case-insensitive search on station name.
      - name: min_power
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            minimum: 0
          - type: 'null'
          description: Min power (kW).
          title: Min Power
        description: Min power (kW).
      - name: max_power
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            minimum: 0
          - type: 'null'
          description: Max power (kW).
          title: Max Power
        description: Max power (kW).
      - name: bbox
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Bounding box 'minLon,minLat,maxLon,maxLat'.
          examples:
          - 106.55,-6.65,107.10,-5.95
          title: Bbox
        description: Bounding box 'minLon,minLat,maxLon,maxLat'.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          minimum: 1
          description: Page size.
          default: 100
          title: Limit
        description: Page size.
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Page offset.
          default: 0
          title: Offset
        description: Page offset.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StationList'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stations/nearby:
    get:
      tags:
      - stations
      summary: Nearest stations to a point ('near me')
      operationId: nearby_api_v1_stations_nearby_get
      parameters:
      - name: lat
        in: query
        required: true
        schema:
          type: number
          maximum: 90
          minimum: -90
          description: Origin latitude.
          examples:
          - -6.2088
          title: Lat
        description: Origin latitude.
      - name: lon
        in: query
        required: true
        schema:
          type: number
          maximum: 180
          minimum: -180
          description: Origin longitude.
          examples:
          - 106.8456
          title: Lon
        description: Origin longitude.
      - name: radius_km
        in: query
        required: false
        schema:
          type: number
          maximum: 500
          exclusiveMinimum: 0
          description: Search radius (km).
          default: 5.0
          title: Radius Km
        description: Search radius (km).
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          description: Max results, sorted by distance.
          default: 20
          title: Limit
        description: Max results, sorted by distance.
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Source'
          - type: 'null'
          description: Optional source filter.
          title: Source
        description: Optional source filter.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Station'
                title: Response Nearby Api V1 Stations Nearby Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stations/{station_id}:
    get:
      tags:
      - stations
      summary: Fetch one station by id
      operationId: get_station_api_v1_stations__station_id__get
      parameters:
      - name: station_id
        in: path
        required: true
        schema:
          type: string
          title: Station Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Station'
        '404':
          description: Not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stations.geojson:
    get:
      tags:
      - geo
      summary: Stations as a GeoJSON FeatureCollection
      operationId: stations_geojson_api_v1_stations_geojson_get
      parameters:
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Source'
          - type: 'null'
          title: Source
      - name: province
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Province
      - name: city
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: City
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      - name: min_power
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            minimum: 0
          - type: 'null'
          title: Min Power
      - name: max_power
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            minimum: 0
          - type: 'null'
          title: Max Power
      - name: bbox
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          examples:
          - 106.55,-6.65,107.10,-5.95
          title: Bbox
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 20000
          minimum: 1
          default: 5000
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GeoJSONFeatureCollection'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/route:
    get:
      tags:
      - geo
      summary: Shortest driving path (Dijkstra) to a point or station
      operationId: route_api_v1_route_get
      parameters:
      - name: lat
        in: query
        required: true
        schema:
          type: number
          maximum: 90
          minimum: -90
          description: Origin latitude.
          examples:
          - -6.2088
          title: Lat
        description: Origin latitude.
      - name: lon
        in: query
        required: true
        schema:
          type: number
          maximum: 180
          minimum: -180
          description: Origin longitude.
          examples:
          - 106.8456
          title: Lon
        description: Origin longitude.
      - name: station_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Destination = this station's coordinates.
          title: Station Id
        description: Destination = this station's coordinates.
      - name: dest_lat
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 90
            minimum: -90
          - type: 'null'
          description: Destination latitude (if no station_id).
          title: Dest Lat
        description: Destination latitude (if no station_id).
      - name: dest_lon
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 180
            minimum: -180
          - type: 'null'
          description: Destination longitude (if no station_id).
          title: Dest Lon
        description: Destination longitude (if no station_id).
      - name: weight
        in: query
        required: false
        schema:
          type: string
          pattern: ^(length|travel_time)$
          description: Minimise 'length' (shortest) or 'travel_time' (fastest).
          default: length
          title: Weight
        description: Minimise 'length' (shortest) or 'travel_time' (fastest).
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Route'
        '404':
          description: Station not found / no drivable route
        '422':
          description: Destination not provided
        '503':
          description: Road graph unavailable (not built yet)
  /api/v1/route/nearest-station:
    get:
      tags:
      - geo
      summary: Nearest charging station reachable by road (Dijkstra) + route to it
      operationId: nearest_station_api_v1_route_nearest_station_get
      parameters:
      - name: lat
        in: query
        required: true
        schema:
          type: number
          maximum: 90
          minimum: -90
          description: Origin latitude.
          examples:
          - -6.2088
          title: Lat
        description: Origin latitude.
      - name: lon
        in: query
        required: true
        schema:
          type: number
          maximum: 180
          minimum: -180
          description: Origin longitude.
          examples:
          - 106.8456
          title: Lon
        description: Origin longitude.
      - name: source
        in: query
        required: false
        schema:
          anyOf:
          - $ref: '#/components/schemas/Source'
          - type: 'null'
          description: Optional source filter.
          title: Source
        description: Optional source filter.
      - name: weight
        in: query
        required: false
        schema:
          type: string
          pattern: ^(length|travel_time)$
          description: Rank by 'length' (nearest) or 'travel_time' (quickest).
          default: length
          title: Weight
        description: Rank by 'length' (nearest) or 'travel_time' (quickest).
      - name: max_range_km
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            exclusiveMinimum: 0
          - type: 'null'
          description: EV remaining range (km). Flags whether the nearest charger
            is within reach (Route & Battery).
          title: Max Range Km
        description: EV remaining range (km). Flags whether the nearest charger is
          within reach (Route & Battery).
      - name: ev_model_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: EV model id (see /api/v1/ev-models). With current_soc the backend
            derives the remaining range — overrides max_range_km.
          title: Ev Model Id
        description: EV model id (see /api/v1/ev-models). With current_soc the backend
          derives the remaining range — overrides max_range_km.
      - name: current_soc
        in: query
        required: false
        schema:
          anyOf:
          - type: number
            maximum: 100
            minimum: 0
          - type: 'null'
          description: Current state of charge (%); required when ev_model_id is given.
          title: Current Soc
        description: Current state of charge (%); required when ev_model_id is given.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NearestStationRoute'
        '404':
          description: No stations loaded / none reachable by road
        '503':
          description: Road graph unavailable (not built yet)
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ev-models:
    get:
      tags:
      - ev-models
      summary: List EV models (catalogue from the Kaggle Indonesia-EV-2026 dataset)
      operationId: ev_models_api_v1_ev_models_get
      parameters:
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive search on vehicle name.
          title: Q
        description: Case-insensitive search on vehicle name.
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          minimum: 1
          description: Page size.
          default: 100
          title: Limit
        description: Page size.
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          description: Page offset.
          default: 0
          title: Offset
        description: Page offset.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EVModelList'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/ev-models/{model_id}:
    get:
      tags:
      - ev-models
      summary: Fetch one EV model by id
      operationId: ev_model_api_v1_ev_models__model_id__get
      parameters:
      - name: model_id
        in: path
        required: true
        schema:
          type: string
          title: Model Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EVModel'
        '404':
          description: Not found
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stats:
    get:
      tags:
      - meta
      summary: Aggregate statistics
      operationId: stats_api_v1_stats_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'
  /api/v1/sources:
    get:
      tags:
      - meta
      summary: Sources with counts
      operationId: sources_api_v1_sources_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SourceCount'
                type: array
                title: Response Sources Api V1 Sources Get
  /api/v1/provinces:
    get:
      tags:
      - meta
      summary: Provinces with counts (filter dropdown)
      operationId: provinces_api_v1_provinces_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/NameCount'
                type: array
                title: Response Provinces Api V1 Provinces Get
  /api/v1/cities:
    get:
      tags:
      - meta
      summary: Cities with counts (optionally within a province)
      operationId: cities_api_v1_cities_get
      parameters:
      - name: province
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Restrict to one province.
          title: Province
        description: Restrict to one province.
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/NameCount'
                title: Response Cities Api V1 Cities Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    EVModel:
      properties:
        id:
          type: string
          title: Id
          examples:
          - wuling-air-ev
        name:
          type: string
          title: Name
          examples:
          - Wuling Air EV
        make:
          anyOf:
          - type: string
          - type: 'null'
          title: Make
          examples:
          - Wuling
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
          examples:
          - Air EV
        battery_kwh:
          anyOf:
          - type: number
          - type: 'null'
          title: Battery Kwh
          description: Usable battery capacity (kWh).
          examples:
          - 26.7
        range_km:
          anyOf:
          - type: number
          - type: 'null'
          title: Range Km
          description: Manufacturer range (km); the lower bound where a range is given.
          examples:
          - 200.0
        price_range:
          anyOf:
          - type: string
          - type: 'null'
          title: Price Range
          examples:
          - Rp 214 - 307,5 Juta
        charging_time:
          anyOf:
          - type: string
          - type: 'null'
          title: Charging Time
          examples:
          - 8.5 Jam
        source_url:
          anyOf:
          - type: string
          - type: 'null'
          title: Source Url
      type: object
      required:
      - id
      - name
      title: EVModel
    EVModelList:
      properties:
        total:
          type: integer
          title: Total
          examples:
          - 60
        limit:
          type: integer
          title: Limit
          examples:
          - 100
        offset:
          type: integer
          title: Offset
          examples:
          - 0
        items:
          items:
            $ref: '#/components/schemas/EVModel'
          type: array
          title: Items
      type: object
      required:
      - total
      - limit
      - offset
      - items
      title: EVModelList
    GeoJSONFeatureCollection:
      properties:
        type:
          type: string
          title: Type
          default: FeatureCollection
          examples:
          - FeatureCollection
        features:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Features
      type: object
      required:
      - features
      title: GeoJSONFeatureCollection
      description: RFC 7946 FeatureCollection — drop straight into Leaflet/Mapbox.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    Health:
      properties:
        status:
          type: string
          title: Status
          examples:
          - ok
        stations_loaded:
          type: integer
          title: Stations Loaded
          examples:
          - 3569
        version:
          type: string
          title: Version
          examples:
          - 1.0.0
      type: object
      required:
      - status
      - stations_loaded
      - version
      title: Health
    NameCount:
      properties:
        name:
          type: string
          title: Name
          examples:
          - DKI Jakarta
        count:
          type: integer
          title: Count
          examples:
          - 731
      type: object
      required:
      - name
      - count
      title: NameCount
    NearestStationRoute:
      properties:
        station:
          $ref: '#/components/schemas/Station'
          description: The closest reachable station; its distance_km mirrors the
            road distance.
        route:
          $ref: '#/components/schemas/Route'
        candidates_considered:
          type: integer
          title: Candidates Considered
          description: How many stations were reachable by road and ranked.
          examples:
          - 1142
        within_range:
          type: boolean
          title: Within Range
          description: False if the nearest station is beyond the EV's remaining range.
          default: true
        range_used_km:
          anyOf:
          - type: number
          - type: 'null'
          title: Range Used Km
          description: Remaining range (km) used for the within_range check — either
            the explicit max_range_km, or derived from ev_model_id + current_soc.
          examples:
          - 85.0
      type: object
      required:
      - station
      - route
      - candidates_considered
      title: NearestStationRoute
      description: Nearest charging station reachable by road + the route to it (Epic
        2.0).
    Route:
      properties:
        weight:
          type: string
          title: Weight
          description: 'Cost minimised: ''length'' (metres) or ''travel_time'' (seconds).'
          examples:
          - length
        distance_m:
          type: number
          title: Distance M
          description: Total path length in metres.
          examples:
          - 4230.5
        duration_s:
          type: number
          title: Duration S
          description: Estimated drive time in seconds.
          examples:
          - 540.2
        origin:
          $ref: '#/components/schemas/RoutePoint'
        destination:
          $ref: '#/components/schemas/RoutePoint'
        node_count:
          type: integer
          title: Node Count
          description: Number of road nodes in the path.
          examples:
          - 87
        geometry:
          $ref: '#/components/schemas/RouteGeometry'
      type: object
      required:
      - weight
      - distance_m
      - duration_s
      - origin
      - destination
      - node_count
      - geometry
      title: Route
      description: Shortest driving path between two points (Dijkstra over the road
        graph).
    RouteGeometry:
      properties:
        type:
          type: string
          title: Type
          default: LineString
          examples:
          - LineString
        coordinates:
          items:
            items:
              type: number
            type: array
          type: array
          title: Coordinates
          description: Ordered [longitude, latitude] pairs (WGS84).
      type: object
      required:
      - coordinates
      title: RouteGeometry
      description: GeoJSON LineString — drop straight into `L.geoJSON()` to draw the
        path.
    RoutePoint:
      properties:
        lat:
          type: number
          title: Lat
          examples:
          - -6.2088
        lon:
          type: number
          title: Lon
          examples:
          - 106.8456
        snapped_node:
          type: string
          title: Snapped Node
          description: Nearest road-graph node the point was snapped to.
        snap_distance_km:
          type: number
          title: Snap Distance Km
          description: Distance from the input point to the snapped node.
        station_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Station Id
          description: Set on the destination when routing to a station.
      type: object
      required:
      - lat
      - lon
      - snapped_node
      - snap_distance_km
      title: RoutePoint
    Source:
      type: string
      enum:
      - pln_spklu
      - open_charge_map
      - osm
      title: Source
    SourceCount:
      properties:
        source:
          $ref: '#/components/schemas/Source'
        count:
          type: integer
          title: Count
      type: object
      required:
      - source
      - count
      title: SourceCount
    Station:
      properties:
        id:
          type: string
          title: Id
          description: Stable unique id, '<source>-<n>'.
          examples:
          - pln_spklu-1
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
          examples:
          - SPKLU PLN UID JAKARTA RAYA
        source:
          $ref: '#/components/schemas/Source'
          description: Originating dataset.
        latitude:
          type: number
          maximum: 90.0
          minimum: -90.0
          title: Latitude
          examples:
          - -6.18039
        longitude:
          type: number
          maximum: 180.0
          minimum: -180.0
          title: Longitude
          examples:
          - 106.833191
        address:
          anyOf:
          - type: string
          - type: 'null'
          title: Address
          examples:
          - Jl. M.I. Ridwan Rais No.1, Gambir
        province:
          anyOf:
          - type: string
          - type: 'null'
          title: Province
          examples:
          - DKI Jakarta
        city:
          anyOf:
          - type: string
          - type: 'null'
          title: City
          examples:
          - Kota ADM Jakarta Pusat
        operator:
          anyOf:
          - type: string
          - type: 'null'
          title: Operator
          examples:
          - PLN
        power_kw:
          anyOf:
          - type: number
          - type: 'null'
          title: Power Kw
          description: Peak power (kW).
          examples:
          - 22.0
        charge_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Charge Type
          description: slow / medium / fast where known.
          examples:
          - medium
        connectors:
          anyOf:
          - type: integer
          - type: 'null'
          title: Connectors
